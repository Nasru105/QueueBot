services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: queuebot
    restart: unless-stopped
    env_file: .env
    working_dir: /app
    environment:
      - PYTHONPATH=/app
    depends_on:
      - mongo
    volumes:
      - ./app:/app/app
      - /var/log/queuebot:/var/log/queuebot
    networks:
      - internal

  mongo:
    image: mongo:8.0
    container_name: queuebot_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
    command: --wiredTigerCacheSizeGB 1 --auth
    networks:
      - internal

  mongo-express:
    image: mongo-express:1.0
    container_name: queuebot_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_PASS}
      ME_CONFIG_MONGODB_SERVER: mongo
    depends_on:
      - mongo
    networks:
      - internal

volumes:
  mongo_data:

networks:
  internal:
